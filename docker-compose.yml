# ==============================================================
# Smart Farm AI Engine — Local Development Compose
# ==============================================================
services:
  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - CROP_PROFILE=${CROP_PROFILE:-rice}
    container_name: ${AI_ENGINE_CONTAINER_NAME:-smart-farm-ai-engine}
    ports:
      - "${AI_ENGINE_PORT:-8000}:8000"
    volumes:
      # Option A: Mount models and datasets from host to keep image size small
      - ./models:/app/models:ro
      - ./datasets:/app/datasets:ro
    environment:
      - CROP_PROFILE=${CROP_PROFILE:-rice}
      - MODEL_CHECKPOINT_PATH=/app/models/rice/rice_leaf_classifier/best_model.pth
      - MODEL_LABELS_FILE=/app/models/rice/rice_leaf_classifier/labels.json
      - MODEL_CONFIG_FILE=/app/models/rice/rice_leaf_classifier/config.yaml
      - MODEL_ADVICE_FILE=/app/models/rice/rice_leaf_classifier/advice_map.yaml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
