[receiver]
bind = "0.0.0.0:9000"
once = false
timeout_ms = 30000
ack_mismatch = "ack:error"
ack_unknown_sensor = "ack:unknown_sensor"
token_store_path = "state/token_store.json"
registry_path = "state/registry.json"

[[exact_payloads]]
payload = "success"
ack = "ack:success"

[[sensors]]
id = "mq7"
ack = "ack:mq7"
required_fields = ["raw", "voltage"]

[sensors.field_types]
raw = "u16"
voltage = "f32"

[[sensors]]
id = "dht22"
ack = "ack:dht22"
required_fields = ["temp_c", "hum"]

[sensors.field_types]
temp_c = "f32"
hum = "f32"

[[sensors]]
id = "adc"
ack = "ack:adc"
required_fields = ["pin", "raw", "voltage"]

[sensors.field_types]
pin = "u8"
raw = "u16"
voltage = "f32"

[[sensors]]
id = "pcf8591"
ack = "ack:pcf8591"
required_fields = ["addr", "ain0", "ain1", "ain2", "ain3"]

[sensors.field_types]
addr = "string"
ain0 = "u8"
ain1 = "u8"
ain2 = "u8"
ain3 = "u8"
