<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>农业监测管理系统 - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#10b981', secondary: '#0ea5e9', dark: '#0f172a' },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <link rel="stylesheet" type="text/tailwindcss" href="styles.css" />
</head>
  <!-- 背景占位说明：您可以在下方 body 的 style 中将 background 改为您的本地图片路径，如：background-image: url('assets/login_bg.png') -->
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden" 
      style="background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); background-size: cover;">
  <div class="absolute inset-0 z-0 pointer-events-none bg-white/10 backdrop-blur-[2px]">
      <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-white/20 rounded-full blur-[100px]"></div>
      <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-300/20 rounded-full blur-[100px]"></div>
  </div>

  <div class="z-10 w-full max-w-md glass rounded-3xl p-8 relative shadow-2xl border border-white/10">
    <div class="text-center mb-10">
      <div class="w-24 h-24 mx-auto flex items-center justify-center mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" class="w-full h-full drop-shadow-[0_0_20px_rgba(16,185,129,0.4)] transition-transform duration-1000">
                <g id="fields" stroke="#18181b" stroke-width="6" fill="none" stroke-linecap="round">
                    <path d="M 50 360 Q 200 320 350 360"/>
                    <path d="M 90 380 Q 200 345 310 380" opacity="0.4"/>
                </g>
                <g id="palm-tree">
                    <path d="M 185 360 Q 195 240 200 160 Q 205 240 215 360 Z" fill="#44BD32"/>
                    <path d="M 200 160 C 185 80 160 40 200 20 C 240 40 215 80 200 160 Z" fill="#44BD32"/>
                    <circle cx="200" cy="20" r="5" fill="#44BD32"/>
                    <path d="M 200 160 C 150 100 80 70 50 80 C 90 110 150 130 200 160 Z" fill="#44BD32"/>
                    <circle cx="50" cy="80" r="5" fill="#44BD32"/>
                    <path d="M 200 160 C 250 100 320 70 350 80 C 310 110 250 130 200 160 Z" fill="#44BD32"/>
                    <circle cx="350" cy="80" r="5" fill="#44BD32"/>
                    <path d="M 200 160 C 140 130 60 130 20 165 C 80 175 140 175 200 160 Z" fill="#44BD32"/>
                    <circle cx="20" cy="165" r="5" fill="#44BD32"/>
                    <path d="M 200 160 C 260 130 340 130 380 165 C 320 175 260 175 200 160 Z" fill="#44BD32"/>
                    <circle cx="380" cy="165" r="5" fill="#44BD32"/>
                    <path d="M 200 160 C 150 170 70 210 40 260 C 90 240 160 200 200 160 Z" fill="#44BD32"/>
                    <circle cx="40" cy="260" r="5" fill="#44BD32"/>
                    <path d="M 200 160 C 250 170 330 210 360 260 C 310 240 240 200 200 160 Z" fill="#44BD32"/>
                    <circle cx="360" cy="260" r="5" fill="#44BD32"/>
                </g>
                <g id="drone">
                    <path d="M 120 220 C 150 220 170 230 200 230 C 230 230 250 220 280 220" fill="none" stroke="#18181b" stroke-width="8" stroke-linecap="round"/>
                    <rect x="105" y="205" width="30" height="15" rx="4" fill="#18181b"/>
                    <rect x="265" y="205" width="30" height="15" rx="4" fill="#18181b"/>
                    <path d="M 60 205 Q 120 195 180 205 Q 120 215 60 205 Z" fill="#3f3f46" opacity="0.9"/>
                    <path d="M 220 205 Q 280 195 340 205 Q 280 215 220 205 Z" fill="#3f3f46" opacity="0.9"/>
                    <path d="M 170 240 C 155 270 145 300 125 310" fill="none" stroke="#18181b" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 230 240 C 245 270 255 300 275 310" fill="none" stroke="#18181b" stroke-width="6" stroke-linecap="round"/>
                    <path d="M 160 225 Q 200 205 240 225 L 260 245 C 260 255 240 265 200 265 C 160 265 140 255 140 245 Z" fill="#18181b"/>
                    <circle cx="200" cy="265" r="16" fill="#18181b"/>
                    <circle cx="200" cy="265" r="9" fill="#e4e4e7"/>
                    <circle cx="200" cy="265" r="4.5" fill="#18181b"/>
                    <circle cx="203" cy="262" r="2" fill="#ffffff"/>
                    <path d="M 185 295 Q 200 305 215 295" fill="none" stroke="#18181b" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
                    <path d="M 175 305 Q 200 320 225 305" fill="none" stroke="#18181b" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
                </g>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-wide">AI 智慧农业枢纽</h1>
      <p class="text-emerald-400/80 text-sm mt-2 tracking-widest uppercase">Intelligent Farm OS</p>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-xs text-slate-400 mb-1 ml-1 uppercase">授权账号</label>
        <input id="username" type="text" class="w-full border rounded-xl px-4 py-3 input-focus" placeholder="请输入账号" autocomplete="off" />
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1 ml-1 uppercase">访问密码</label>
        <input id="password" type="password" class="w-full border rounded-xl px-4 py-3 input-focus" placeholder="请输入密码" autocomplete="off" />
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1 ml-1 uppercase">目标网关绑定 (设备监听)</label>
        <input id="deviceId" type="text" class="w-full border rounded-xl px-4 py-3 input-focus font-mono text-sm" placeholder="选填，默认监听全网段" autocomplete="off" />
      </div>
      <button id="loginBtn" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white py-3.5 rounded-xl font-bold tracking-wider shadow-lg shadow-emerald-500/25 transition-all duration-300 transform hover:-translate-y-0.5 active:translate-y-0 text-sm">
        <i class="fa fa-power-off mr-2"></i> 启动系统中枢
      </button>
      <p id="msg" class="text-sm text-rose-400 text-center h-4"></p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
