<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Registry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .toolbar {
            display: flex;
            align-items: flex-start;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.03);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-width: 260px;
            position: relative;
        }
        .filter-group label {
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding-left: 4px;
        }
        /* 自定义下拉框样式 */
        .custom-select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 16px;
            color: #fff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .custom-select:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        .custom-select.active {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .options-list {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            z-index: 1000;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .options-list.show {
            display: block;
            animation: slideDown 0.2s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .option-item {
            padding: 12px 16px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .option-item:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .option-item.selected {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            font-weight: 600;
        }
        .option-item.selected::after {
            content: '✓';
            font-weight: 700;
        }
        /* 滚动条美化 */
        .options-list::-webkit-scrollbar { width: 6px; }
        .options-list::-webkit-scrollbar-track { background: transparent; }
        .options-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .options-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .toolbar .total-badge {
            margin-left: auto;
            align-self: center;
            font-size: 0.9rem;
            color: #60a5fa;
            font-weight: 700;
            background: rgba(96, 165, 250, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }
        .tree-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .tree-table th {
            text-align: left;
            padding: 10px 12px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .tree-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #d1d5db;
        }
        .tree-table tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        .tree-table a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }
        .tree-table a:hover { text-decoration: underline; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-active { background: rgba(34,197,94,0.15); color: #22c55e; }
        .badge-dead { background: rgba(239,68,68,0.15); color: #ef4444; }
        .badge-removed { background: rgba(156,163,175,0.15); color: #9ca3af; }
        .badge-replanted { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.2rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        .pagination button {
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #d1d5db;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination button:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
        .pagination button:disabled { opacity: 0.3; cursor: default; }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.35);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌴 Tree Registry</h1>
            <div>
                <a href="plantation_dashboard.html" class="back-link">Dashboard</a>
                <a href="index.html" class="back-link" style="margin-left:12px;">UAV Review</a>
                <a href="/" class="back-link" style="margin-left:12px;">Portal</a>
            </div>
        </header>
        <main>
            <section class="panel">
                <div class="toolbar">
                    <div class="filter-group">
                        <label>1. Select Plantation</label>
                        <div id="plantation-dropdown" class="custom-select">
                            <span class="selected-text" id="plantation-text">-- All Plantations --</span>
                            <span class="arrow">▼</span>
                        </div>
                        <div id="plantation-options" class="options-list"></div>
                    </div>
                    
                    <div class="filter-group">
                        <label>2. Filter by Mission</label>
                        <div id="mission-dropdown" class="custom-select" style="opacity: 0.5; pointer-events: none;">
                            <span class="selected-text" id="mission-text">Please select a plantation...</span>
                            <span class="arrow">▼</span>
                        </div>
                        <div id="mission-options" class="options-list"></div>
                    </div>
                    
                    <span class="total-badge" id="total-badge">Total Assets: 0</span>
                </div>

                <div id="table-container">
                    <div class="empty-state">Loading registry...</div>
                </div>

                <div class="pagination" id="pagination" style="display:none;">
                    <button id="btn-prev" disabled>&laquo; Prev</button>
                    <span id="btn-page-info">Page 1</span>
                    <button id="btn-next">&raquo; Next</button>
                </div>
            </section>
        </main>
    </div>
    <script src="tree_list.js"></script>
</body>
</html>
