<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }
        @media (max-width: 640px) {
            .profile-grid { grid-template-columns: 1fr; }
        }
        .info-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 1.2rem;
        }
        .info-card h3 {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.8rem;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.92rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: rgba(255,255,255,0.5); }
        .info-value { color: #e0e0e0; font-weight: 500; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-active { background: rgba(34,197,94,0.15); color: #22c55e; }
        .badge-dead { background: rgba(239,68,68,0.15); color: #ef4444; }
        .badge-removed { background: rgba(156,163,175,0.15); color: #9ca3af; }
        .badge-replanted { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .timeline-empty {
            text-align: center;
            padding: 2rem;
            color: rgba(255,255,255,0.35);
            font-style: italic;
        }
        .timeline-item {
            background: rgba(255,255,255,0.03);
            border-left: 3px solid rgba(59,130,246,0.5);
            padding: 0.8rem 1rem;
            margin-bottom: 0.6rem;
            border-radius: 0 8px 8px 0;
        }
        .action-bar {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .btn-status {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #d1d5db;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-status:hover { background: rgba(255,255,255,0.1); }
        .btn-status.danger { border-color: rgba(239,68,68,0.3); color: #ef4444; }
        .btn-status.danger:hover { background: rgba(239,68,68,0.1); }
        .session-controls {
            display: grid;
            grid-template-columns: 160px 1fr auto;
            gap: 0.75rem;
            align-items: end;
            margin-top: 1rem;
        }
        .session-controls select,
        .session-controls input {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #e5e7eb;
            padding: 0.7rem;
        }
        .session-result {
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 0.8rem;
            color: #cbd5e1;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }
        @media (max-width: 760px) {
            .session-controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="profile-title">Tree Profile</h1>
            <div>
                <a href="tree_list.html" class="back-link">Tree Registry</a>
                <a href="index.html" class="back-link" style="margin-left:12px;">UAV Review</a>
                <a href="/" class="back-link" style="margin-left:12px;">Portal</a>
            </div>
        </header>
        <main>
            <div id="loading" class="status-box">Loading tree data...</div>
            <div id="profile-content" style="display:none;">
                <div class="profile-grid">
                    <div class="info-card">
                        <h3>Basic Info</h3>
                        <div id="basic-info"></div>
                    </div>
                    <div class="info-card">
                        <h3>Location</h3>
                        <div id="location-info"></div>
                    </div>
                </div>
                <section class="panel" style="margin-top:1.5rem;">
                    <h2>Timeline / Coordinate History</h2>
                    <div id="timeline-content"></div>
                </section>
                <section class="panel">
                    <h2>Observation Session</h2>
                    <div id="barcode-box" class="status-box">Barcode: loading...</div>
                    <div class="action-bar">
                        <button id="btn-start-session" class="btn">Start Collection</button>
                    </div>
                    <div id="session-status" class="status-box">No active collection session</div>
                    <div class="session-controls">
                        <select id="image-role">
                            <option value="fruit">Fruit bunch</option>
                            <option value="trunk_base">Trunk base</option>
                            <option value="crown">Crown</option>
                        </select>
                        <input id="session-image" type="file" accept="image/jpeg,image/png">
                        <button id="btn-upload-session-image" class="btn" disabled>Upload</button>
                    </div>
                    <div id="session-result" class="session-result">Session images and mock analysis will appear here.</div>
                </section>
                <section class="panel">
                    <h2>Actions</h2>
                    <div class="action-bar" id="action-bar"></div>
                </section>
            </div>
        </main>
    </div>
    <script src="tree_profile.js"></script>
</body>
</html>
