<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Palm Detection Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Oil Palm UAV Mapping & Review</h1>
            <a href="tree_list.html" class="back-link">Tree Registry</a>
            <a href="/" class="back-link" style="margin-left:12px;">Back to Portal</a>
        </header>

        <main>
            <section class="panel">
                <h2>1. UAV Mission</h2>
                <div class="input-group">
                    <label for="plantation-name">Plantation Name:</label>
                    <input type="text" id="plantation-name" placeholder="e.g. North Block A">
                </div>
                <div class="input-group">
                    <label for="mission-name">Mission Name:</label>
                    <input type="text" id="mission-name" placeholder="e.g. 2024-05-01 Survey">
                </div>
                <button id="btn-create-mission" class="btn">Create Mission</button>
                <div id="mission-status" class="status-box">Status: Not started</div>
            </section>

            <section class="panel">
                <h2>2. Orthomosaic</h2>
                <div class="input-group">
                    <label for="ortho-url">Image URL:</label>
                    <input type="text" id="ortho-url" placeholder="/static/your_image.png" value="/static/ortho_test.png">
                </div>
                <button id="btn-register-ortho" class="btn" disabled>Register Orthomosaic</button>
                <div id="ortho-status" class="status-box">Status: Waiting for mission</div>
            </section>

            <section class="panel">
                <h2>3. Mock Detections</h2>
                <button id="btn-mock-detections" class="btn" disabled>Run Mock Detection</button>
                <a id="btn-view-ortho" class="btn" style="display:none;text-align:center;text-decoration:none;" href="#">Open Ortho Viewer</a>
                <div id="detection-status" class="status-box">Status: Waiting for orthomosaic</div>
                <div class="detection-list" id="detection-list"></div>
            </section>

            <section class="panel">
                <h2>4. Tree Registry</h2>
                <div class="tree-list" id="tree-list"></div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
