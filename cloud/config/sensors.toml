[receiver]
bind = "0.0.0.0:9000"
once = false
timeout_ms = 30000
ack_mismatch = "ack:error"
ack_unknown_sensor = "ack:unknown_sensor"
token_store_path = "state/token_store.json"
registry_path = "state/registry.json"
image_store_path = "state/image_uploads"
image_index_path = "state/image_index.jsonl"
image_db_error_store_path = "state/image_upload_errors.jsonl"
database_url = "host=127.0.0.1 port=55432 user=postgres dbname=CICSIC sslmode=disable"
ai_predict_url = "http://127.0.0.1:8000/api/v1/predict"
openclaw_url = "http://127.0.0.1:3000"

[[exact_payloads]]
payload = "success"
ack = "ack:success"

[[sensors]]
id = "mq7"
ack = "ack:mq7"
required_fields = ["raw", "voltage"]

[sensors.field_types]
raw = "u16"
voltage = "f32"

[[sensors]]
id = "dht22"
ack = "ack:dht22"
required_fields = ["temp_c", "hum"]

[sensors.field_types]
temp_c = "f32"
hum = "f32"

[[sensors]]
id = "adc"
ack = "ack:adc"
required_fields = ["pin", "raw", "voltage"]

[sensors.field_types]
pin = "u8"
raw = "u16"
voltage = "f32"

[[sensors]]
id = "pcf8591"
ack = "ack:pcf8591"
required_fields = ["addr", "ain0", "ain1", "ain2", "ain3"]

[sensors.field_types]
addr = "string"
ain0 = "u8"
ain1 = "u8"
ain2 = "u8"
ain3 = "u8"

[[sensors]]
id = "soil_modbus_02"
ack = "ack:soil_modbus_02"
required_fields = ["vwc", "temp_c", "ec"]

[sensors.field_types]
vwc = "f32"
temp_c = "f32"
ec = "u32"
protocol = "string"
slave_id = "u16"
