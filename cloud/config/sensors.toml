[receiver]
bind = "0.0.0.0:9000"
once = false
timeout_ms = 30000
ack_mismatch = "ack:error"
ack_unknown_sensor = "ack:unknown_sensor"

[[exact_payloads]]
payload = "success"
ack = "ack:success"

[[sensors]]
id = "mq7"
ack = "ack:mq7"
required_fields = ["raw", "voltage"]

[sensors.field_types]
raw = "u16"
voltage = "f32"

[[sensors]]
id = "dht22"
ack = "ack:dht22"
required_fields = ["temp_c", "hum"]

[sensors.field_types]
temp_c = "f32"
hum = "f32"
