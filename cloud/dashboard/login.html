<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>农业监测管理系统 - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#16a34a', secondary: '#0ea5e9', dark: '#1e293b' },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .glass { background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); }
      .input-focus { @apply focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none; }
    }
  </style>
</head>
<body class="min-h-screen bg-[url('https://picsum.photos/id/145/1920/1080')] bg-cover bg-center bg-dark/50 flex items-center justify-center p-4">
  <div class="w-full max-w-md glass rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-primary text-white px-6 py-5 text-center">
      <h1 class="text-2xl font-bold flex items-center justify-center gap-2"><i class="fa fa-leaf"></i>农业监测管理系统</h1>
      <p class="text-sm opacity-90 mt-1">Agricultural Monitoring System</p>
    </div>

    <div class="p-6 space-y-4">
      <div>
        <label class="block text-sm text-gray-700 mb-1">账号</label>
        <input id="username" type="text" class="w-full border rounded-lg px-3 py-2 input-focus" placeholder="请输入账号" />
      </div>
      <div>
        <label class="block text-sm text-gray-700 mb-1">密码</label>
        <input id="password" type="password" class="w-full border rounded-lg px-3 py-2 input-focus" placeholder="请输入密码" />
      </div>
      <div>
        <label class="block text-sm text-gray-700 mb-1">设备过滤（可选）</label>
        <input id="deviceId" type="text" class="w-full border rounded-lg px-3 py-2 input-focus" placeholder="例如 dev__dev_ttyusb0_1776354456" />
      </div>
      <button id="loginBtn" class="w-full bg-primary text-white py-2.5 rounded-lg font-medium">
        <i class="fa fa-sign-in"></i> 登录
      </button>
      <p id="msg" class="text-sm text-gray-500 text-center"></p>
    </div>
  </div>

  <script>
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const deviceId = document.getElementById('deviceId').value.trim();
      const msg = document.getElementById('msg');
      if (!username || !password) {
        msg.textContent = '请输入账号和密码';
        return;
      }
      msg.textContent = '正在进入系统...';
      if (deviceId) localStorage.setItem('device_id', deviceId);
      const q = deviceId ? `?device_id=${encodeURIComponent(deviceId)}` : '';
      location.href = `index.html${q}`;
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
